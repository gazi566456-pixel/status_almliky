workflows:
  android-release:
    name: Android APK Build

    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Fix Gradle
        script: |
          sed -i 's/gradle-8.*/gradle-7.6-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties || true

      - name: Fix Kotlin
        script: |
          sed -i 's/ext.kotlin_version.*/ext.kotlin_version = "1.8.22"/g' android/build.gradle || true

      - name: Clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
